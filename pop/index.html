<!DOCTYPE html>
<html lang="ja">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyclogic Pop</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="jquery-1.12.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="program.js"></script>
</head>
<body>

<div id="content">

  <header class="message-board">
    <div id="hyouji">LET'S TRY!</div>
  </header>

  <main class="puzzle-grid">
    <button type="button" class="panel" id="p1"></button>
    <button type="button" class="panel" id="p2"></button>
    <button type="button" class="panel" id="p3"></button>
    <button type="button" class="panel" id="p4"></button>
    <button type="button" class="panel" id="p5"></button>
    <button type="button" class="panel" id="p6"></button>
    <button type="button" class="panel" id="p7"></button>
    <button type="button" class="panel" id="p8"></button>
    <button type="button" class="panel" id="p9"></button>
  </main>

  <nav class="controls-grid">
    <button type="button" class="bot input-mode" id="input-mode">SINGLE</button>
    <div class="bot-special moves-counter" id="tebo">0</div>
    <button type="button" class="bot sys-set" id="sebo">SET</button>

    <button type="button" class="bot sys-sound" id="sound-toggle">SOUND</button>
    <button type="button" class="bot peek-btn" id="peek-btn">PEEK</button> 
    <button type="button" class="bot sys-reset" id="resebo">RESET</button>

    <button type="button" class="bot mode-select" id="mode-select">MODE 3</button>
    <button type="button" class="bot start-btn" id="challenge-start">START</button>
    <button type="button" class="bot rank-btn" id="rank">RANK</button>
  </nav>

  <footer>
    <div class="answer-area" style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 15px; border: 2px dashed #ccc;">

	<div class="label" style="font-size: 12px; color: #666; margin-bottom: 5px;">ANSWER EXAMPLE</div>
    <button type="button" id="kotae" class="bot" style="width: 100%; background-color: #ffb74d; box-shadow: 0 5px 0 #f57c00; color: #fff;　">
      FORBIDDEN FRUIT
    </button>
 

      <div class="tutorial-entry-area" style="margin-top: 10px;">
        <button type="button" id="start-tutorial" class="bot" style="width: 100%; background-color: #90a4ae; box-shadow: 0 5px 0 #546e7a;">
          TUTORIAL
        </button>
      </div>

      <div class="how-to-area">
        <button type="button" id="how-to-btn" class="bot" style="width: 100%; background-color: #90a4ae; box-shadow: 0 5px 0 #546e7a; margin-top: 10px;">
          Numbers Whisper

        </button>
      </div>
    </div>
  </footer>

  <div id="tutorial-guide-layer" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 25000; pointer-events: none;">
    <svg id="tutorial-svg" width="100%" height="100%">
      <defs>
        <mask id="hole">
          <rect width="100%" height="100%" fill="white" />
          <circle id="guide-circle" cx="0" cy="0" r="0" fill="black" />
        </mask>
      </defs>
      <rect width="100%" height="100%" fill="rgba(0,0,0,0.6)" mask="url(#hole)" />
      <circle id="guide-ring" cx="0" cy="0" r="0" stroke="#ffeb3b" stroke-width="4" fill="none" />
    </svg>
  </div>

  <div id="tutorial-msg-box" style="display: none; position: absolute; width: 310px; z-index: 26000; background: white; padding: 15px; border-radius: 20px; border: 4px solid #ffeb3b; box-shadow: 0 10px 25px rgba(0,0,0,0.2); pointer-events: auto;">
    <div id="tutorial-msg-text" style="color: #333; font-size: 16px; margin-bottom: 10px; line-height: 1.4; font-family: sans-serif; text-align: left;"></div>
    <button type="button" id="tutorial-next-btn" class="bot" style="width: 100px; float: right; background-color: #4caf50; color: white; padding: 5px 0; font-size: 16px; box-shadow: 0 4px 0 #2e7d32;">
      NEXT
    </button>
    <div style="clear: both;"></div>
  </div>

  <div id="tutorial-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 30000; justify-content: center; align-items: center; flex-direction: column;">
    <div style="background: white; padding: 30px; border-radius: 25px; text-align: center; width: 280px; border: 5px solid #ffeb3b;">
      <h2 style="margin-bottom: 20px; color: #333; font-size: 20px; font-family: 'Fredoka One', cursive;">Select Language</h2>
      <button type="button" class="bot lang-btn btn-en" data-lang="en" style="width: 100%; margin-bottom: 15px; background-color: #03a9f4; box-shadow: 0 5px 0 #0288d1;">
        English
      </button>
      <button type="button" class="bot lang-btn btn-ja" data-lang="ja" style="width: 100%; background-color: #ffeb3b; color: #c62828; box-shadow: 0 5px 0 #fbc02d;">
        日本語
      </button>
    </div>
  </div>

  </div>
<svg id="tutorial-guide-layer" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:35000;">
  <defs>
    <mask id="guide-mask">
      <rect width="100%" height="100%" fill="white" />
      <circle id="guide-circle" cx="0" cy="0" r="0" fill="black" />
    </mask>
  </defs>
  <rect width="100%" height="100%" fill="rgba(0,0,0,0.7)" mask="url(#guide-mask)" />
  <circle id="guide-ring" cx="0" cy="0" r="0" fill="none" stroke="#ffeb3b" stroke-width="4" stroke-dasharray="8,4" />
</svg>
 </body>
</html>
